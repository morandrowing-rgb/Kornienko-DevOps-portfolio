apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: pet-shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: yourusername/pet-shop-backend:latest
        ports:
        - containerPort: 5000

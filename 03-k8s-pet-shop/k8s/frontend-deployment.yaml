apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: pet-shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: yourusername/pet-shop-frontend:latest
        ports:
        - containerPort: 80
